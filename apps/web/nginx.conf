server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Proxy API calls to the backend service. Without this, relative
  # fetch('/api/...') calls fall through to the SPA fallback and return
  # index.html (200) instead of JSON, silently breaking every authed flow.
  location /api {
    proxy_pass http://api:3001;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # SPA fallback: serve the app for client-side routes, real files otherwise.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Long-cache immutable build assets.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # Basic security headers (defense in depth alongside any edge proxy).
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  # Tighten CSP for the static SPA. Adjust connect-src to your Supabase project.
  add_header Content-Security-Policy "default-src 'self'; img-src 'self' https: data:; style-src 'self' 'unsafe-inline'; script-src 'self'; connect-src 'self' https://*.supabase.co; font-src 'self';" always;
}