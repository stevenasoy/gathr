<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!--
      CSP is intentionally NOT set here. A meta-tag CSP blocks Vite dev HMR,
      Google Fonts, and would need a hardcoded Supabase project ref. Enforce CSP
      via the production server/edge response header instead (see docs/ops.md).
    -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Gathr — book extraordinary venues for weddings, offsites, parties, and shoots across the Philippines." />
    <meta name="theme-color" content="#6c2bd9" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Gathr" />
    <meta property="og:title" content="Gathr — Venues for every gathering" />
    <meta property="og:description" content="Book extraordinary venues for weddings, offsites, parties, and shoots across the Philippines. Transparent pricing, real reviews, book direct with the venue." />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Gathr — Venues for every gathering" />
    <meta name="twitter:description" content="Book extraordinary venues for weddings, offsites, parties, and shoots across the Philippines." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap"
      onload="this.rel='stylesheet'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap"
      />
    </noscript>
    <title>Gathr — Venues for every gathering</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
